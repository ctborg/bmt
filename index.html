<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PHOTO BOOTH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --surface2: #1a1a22;
    --border: #2a2a38;
    --accent: #e8ff47;
    --accent2: #ff4778;
    --text: #f0f0f8;
    --muted: #6a6a88;
    --header-h: 48px;
    --bottom-h: 148px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── FULL-HEIGHT COLUMN LAYOUT ── */
  .app-shell {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    height: 100dvh; /* dynamic viewport height — accounts for mobile browser chrome */
  }

  /* HEADER */
  .header {
    flex-shrink: 0;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(232,255,71,0.35);
  }
  .logo span { color: var(--muted); }
  .fps-counter {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .fps-counter b { color: var(--accent); }

  /* STAGE — takes all remaining vertical space */
  .stage-wrap {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
    position: relative;
  }

  .stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  canvas#glcanvas {
    /* Fill available space but never overflow — aspect-ratio set dynamically */
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    display: block;
  }

  #flash-overlay {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0s;
  }

  #filter-name-overlay {
    position: absolute;
    top: 10px; left: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(10,10,12,0.75);
    padding: 3px 8px;
    border-radius: 2px;
    border-left: 2px solid var(--accent);
    pointer-events: none;
  }

  /* BOTTOM PANEL */
  .bottom-ui {
    flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 8px 12px env(safe-area-inset-bottom, 8px);
    z-index: 10;
  }

  /* GALLERY — horizontal strip above carousel on mobile */
  .gallery-strip {
    display: flex;
    flex-direction: row;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 0 8px;
    min-height: 0;
  }
  .gallery-strip:empty { display: none; }
  .gallery-strip::-webkit-scrollbar { display: none; }

  .gallery-thumb {
    flex-shrink: 0;
    width: 48px;
    height: 36px;
    object-fit: cover;
    border-radius: 3px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    animation: thumbIn 0.25s ease;
  }
  .gallery-thumb:hover, .gallery-thumb:active {
    border-color: var(--accent2);
    transform: scale(1.08);
  }
  @keyframes thumbIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* FILTER CAROUSEL */
  .carousel-track {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 2px 0 8px;
    scrollbar-width: none;
    justify-content: center; /* centers when all chips fit; scrolls when they don't */
  }
  .carousel-track::-webkit-scrollbar { display: none; }

  .filter-chip {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.15s ease;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }
  .filter-chip:active { transform: scale(0.93); }

  .chip-preview {
    width: 52px;
    height: 38px;
    border-radius: 5px;
    border: 2px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .filter-chip.active .chip-preview {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(232,255,71,0.3);
  }
  .filter-chip.active .chip-label { color: var(--accent); }
  .chip-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.48rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    transition: color 0.15s;
    max-width: 52px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chip-icon { font-size: 1.2rem; line-height: 1; }

  /* CONTROLS ROW */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding-top: 4px;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    padding: 9px 0;
    width: 100px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    touch-action: manipulation;
  }
  .btn:hover { border-color: var(--accent); color: var(--text); }
  .btn:active { border-color: var(--accent); color: var(--text); }

  .btn-capture {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative;
    touch-action: manipulation;
  }
  .btn-capture::after {
    content: '';
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform 0.1s;
  }
  .btn-capture:active { transform: scale(0.93); box-shadow: 0 0 20px rgba(232,255,71,0.4); }
  .btn-capture:active::after { transform: scale(0.87); }

  /* ── LANDSCAPE: restore side gallery, wider canvas ── */
  @media (orientation: landscape) {
    :root { --header-h: 42px; --bottom-h: 120px; }

    .gallery-strip {
      /* Move gallery to fixed right side in landscape */
      position: fixed;
      right: 10px;
      top: var(--header-h);
      bottom: var(--bottom-h);
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 0;
      width: 58px;
      gap: 6px;
      background: transparent;
      z-index: 10;
    }
    .gallery-thumb {
      width: 54px;
      height: 40px;
    }
    /* Shrink bottom panel in landscape */
    .bottom-ui { padding: 6px 10px env(safe-area-inset-bottom, 6px); }
    .chip-preview { width: 46px; height: 34px; }
    .chip-label { font-size: 0.44rem; max-width: 46px; }
    .btn-capture { width: 54px; height: 54px; }
    .btn-capture::after { width: 42px; height: 42px; }
  }

  /* PERMISSION SCREEN */
  #permission-screen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    text-align: center;
    padding: 24px;
  }
  #permission-screen h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.2rem, 8vw, 3.5rem);
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  #permission-screen p {
    color: var(--muted);
    font-size: 0.88rem;
    max-width: 300px;
    line-height: 1.6;
  }
  #permission-screen .btn-start {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 13px 44px;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  #permission-screen .btn-start:active { transform: scale(0.96); }
  .cam-icon { font-size: 2.5rem; }

  /* LIGHTBOX */
  #lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.88);
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 24px;
    backdrop-filter: blur(8px);
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 100%;
    max-height: 70dvh;
    border-radius: 6px;
    border: 2px solid var(--border);
    object-fit: contain;
  }
  .lightbox-actions {
    display: flex; gap: 10px;
  }
  #lightbox-close, #lightbox-dl {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 9px 20px;
    border-radius: 4px;
    cursor: pointer;
  }
  #lightbox-close {
    color: var(--muted);
    border: 1px solid var(--border);
    background: var(--surface);
  }
  #lightbox-dl {
    color: var(--bg);
    background: var(--accent);
    border: none;
  }

  /* NO CAM MSG */
  #nocam-msg {
    display: none;
    position: absolute; inset: 0;
    background: var(--surface);
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<!-- PERMISSION SCREEN -->
<div id="permission-screen">
  <div class="cam-icon">📷</div>
  <h1>PHOTO BOOTH</h1>
  <p>Including real-time head squishing. Grant camera access to begin.</p>
  <button class="btn-start" id="btn-start">Enable Camera</button>
</div>

<div class="app-shell">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">PHOTO <span>BOOTH</span></div>
    <div class="fps-counter">FPS: <b id="fps-val">—</b></div>
  </header>

  <!-- STAGE -->
  <div class="stage-wrap">
    <div class="stage">
      <canvas id="glcanvas"></canvas>
      <div id="flash-overlay"></div>
      <div id="filter-name-overlay">PASSTHROUGH</div>
      <div id="nocam-msg">⚠ Lame NO CAMERA<br>CHECK PERMISSIONS</div>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-ui">
    <!-- Gallery: horizontal on portrait, repositioned by CSS in landscape -->
    <div class="gallery-strip" id="gallery-strip"></div>
    <!-- Filter carousel -->
    <div class="carousel-track" id="carousel"></div>
    <!-- Shutter row -->
    <div class="controls-row">
      <button class="btn" id="btn-prev">◀ PREV</button>
      <button class="btn-capture" id="btn-capture" title="Capture"></button>
      <button class="btn" id="btn-next">NEXT ▶</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lightbox-img" src="" alt="capture">
  <div class="lightbox-actions">
    <button id="lightbox-close">✕ CLOSE</button>
    <button id="lightbox-dl">⬇ DOWNLOAD</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  SHADERS
// ─────────────────────────────────────────────

const VERT_SRC = `
attribute vec2 a_position;
varying vec2 v_uv;
void main(){
  v_uv = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;

const FILTERS = [
  {
    name: "Passthrough",
    emoji: "🎥",
    frag: `
precision mediump float;
uniform sampler2D u_tex;
varying vec2 v_uv;
void main(){
  vec2 uv = v_uv;
  uv.x = 1.0 - uv.x;
  gl_FragColor = texture2D(u_tex, uv);
}`
  },
  {
    name: "Comic Book",
    emoji: "💥",
    frag: `
precision mediump float;
uniform sampler2D u_tex;
uniform vec2 u_resolution;
varying vec2 v_uv;

vec3 quantize(vec3 c, float steps){
  return floor(c * steps + 0.5) / steps;
}

void main(){
  vec2 uv = v_uv;
  uv.x = 1.0 - uv.x;
  vec2 px = 1.0 / u_resolution;

  // Sobel edge detection
  vec3 tl = texture2D(u_tex, uv + vec2(-px.x,  px.y)).rgb;
  vec3 tc = texture2D(u_tex, uv + vec2(  0.0,  px.y)).rgb;
  vec3 tr = texture2D(u_tex, uv + vec2( px.x,  px.y)).rgb;
  vec3 ml = texture2D(u_tex, uv + vec2(-px.x,   0.0)).rgb;
  vec3 mr = texture2D(u_tex, uv + vec2( px.x,   0.0)).rgb;
  vec3 bl = texture2D(u_tex, uv + vec2(-px.x, -px.y)).rgb;
  vec3 bc = texture2D(u_tex, uv + vec2(  0.0, -px.y)).rgb;
  vec3 br = texture2D(u_tex, uv + vec2( px.x, -px.y)).rgb;

  float lTL = dot(tl, vec3(0.299,0.587,0.114));
  float lTC = dot(tc, vec3(0.299,0.587,0.114));
  float lTR = dot(tr, vec3(0.299,0.587,0.114));
  float lML = dot(ml, vec3(0.299,0.587,0.114));
  float lMR = dot(mr, vec3(0.299,0.587,0.114));
  float lBL = dot(bl, vec3(0.299,0.587,0.114));
  float lBC = dot(bc, vec3(0.299,0.587,0.114));
  float lBR = dot(br, vec3(0.299,0.587,0.114));

  float gx = -lTL - 2.0*lML - lBL + lTR + 2.0*lMR + lBR;
  float gy = -lTL - 2.0*lTC - lTR + lBL + 2.0*lBC + lBR;
  float edge = sqrt(gx*gx + gy*gy);
  float ink = step(0.18, edge);

  vec3 col = texture2D(u_tex, uv).rgb;
  col = quantize(col, 4.0);
  // Saturate
  float lum = dot(col, vec3(0.299,0.587,0.114));
  col = mix(vec3(lum), col, 2.2);
  col = clamp(col, 0.0, 1.0);
  col = mix(col, vec3(0.0), ink);
  gl_FragColor = vec4(col, 1.0);
}`
  },
  {
    name: "Snowfall",
    emoji: "❄️",
    frag: `
precision mediump float;
uniform sampler2D u_tex;
uniform sampler2D u_snow_tex;  // R=surfaceY, G=snowAmount 0..1, B=disturbance
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
uniform float u_mouse_speed;
varying vec2 v_uv;

float rand(vec2 n){ return fract(sin(dot(n,vec2(12.9898,78.233)))*43758.5453); }
float rand1(float n){ return fract(sin(n*127.1)*43758.5453); }

float noise1(float x){
  float i=floor(x); float f=fract(x);
  float u=f*f*(3.0-2.0*f);
  return mix(rand1(i),rand1(i+1.0),u);
}

void main(){
  vec2 uv = v_uv;
  uv.x = 1.0 - uv.x;
  vec3 video = texture2D(u_tex, uv).rgb;

  // ── Accumulation data ────────────────────────────────────
  vec3 sd      = texture2D(u_snow_tex, vec2(uv.x, 0.5)).rgb;
  float surfY  = sd.r;    // UV y of detected surface top (0=bottom,1=top)
  float amount = sd.g;    // accumulated depth, 0..1, grows very slowly
  float disturb= sd.b;

  // The pile is a thin cap sitting ON the surface, growing upward.
  // Hard cap: never exceeds 4% of frame height even at amount=1.
  float maxThick = 0.04 * amount;

  // Organic bumpy top edge
  float bx = uv.x * 160.0;
  float bump = noise1(bx*0.6)*0.50 + noise1(bx*1.7)*0.30
             + noise1(bx*4.1)*0.13 + noise1(bx*9.3)*0.07;
  // bump is 0..1, centre and scale so peak deviation = ±40% of maxThick
  float bumpOffset = (bump - 0.5) * 2.0 * maxThick * 0.4;

  // Pile occupies the band: [surfY, surfY + maxThick + bumpOffset]
  float pileTop = surfY + maxThick + bumpOffset;
  // Signed distance: negative = pixel is inside the pile
  float sd_top  = uv.y - pileTop;        // >0 above pile, <0 inside
  float sd_bot  = uv.y - (surfY - 0.001);// >0 above base of surface

  // Only paint pixels BETWEEN surfY and pileTop — never below surface
  float inPile = smoothstep(0.002, -0.001, sd_top)   // fade at top edge
               * smoothstep(-0.001, 0.003, sd_bot);   // hard cut at surface
  inPile *= smoothstep(0.0, 0.12, amount);            // fade in gradually
  inPile *= (1.0 - disturb * 0.98);

  // ── Pile shading ─────────────────────────────────────────
  // depth inside pile: 0=top surface, 1=base at surfY
  float depth = clamp((pileTop - uv.y) / max(maxThick, 0.0001), 0.0, 1.0);

  // Snow color: bright white at top, blue-shadow toward base
  vec3 cTop    = vec3(0.97, 0.98, 1.00);
  vec3 cShadow = vec3(0.62, 0.74, 0.92);
  vec3 snowCol = mix(cTop, cShadow, pow(depth, 1.8) * 0.65);

  // Subsurface scattering: near the top edge, bleed video color through
  float edgeThin = smoothstep(0.0, 0.35, depth); // 0 at very top = thin
  snowCol = mix(snowCol + video * 0.12, snowCol, edgeThin);

  // Specular: highlight on flat parts of bump surface
  float bumpDx = noise1(bx*0.6+0.3) - noise1(bx*0.6-0.3);
  float spec   = pow(max(0.0, 1.0 - abs(bumpDx)*12.0), 8.0);
  snowCol += vec3(1.0) * spec * 0.35;

  // Occasional twinkle glints
  float glint = step(0.975, rand(vec2(floor(uv.x*120.0), floor(u_time*4.0))));
  snowCol += glint * 0.4 * smoothstep(0.01, 0.0, abs(sd_top));

  // ── Falling flakes (motion-blurred streaks per paper) ───
  // The paper uses inter-frame accumulation for blur.
  // We fake it: each flake is an elongated ellipse oriented along fall dir.
  vec2 ar = vec2(u_resolution.x/u_resolution.y, 1.0);
  float falling = 0.0;

  for(float i = 0.0; i < 6.0; i++){
    // Each layer: different speed, size, density, drift
    float speed   = 0.04 + i * 0.028;               // slow layers first
    float gsize   = 10.0 + i * 7.0;                 // coarser = closer
    float opacity = 0.55 + i * 0.07;                // closer = more opaque
    float wobble  = sin(u_time*0.6 + i*1.8)*0.035
                  + cos(u_time*0.35+ i*2.7)*0.02;   // lateral drift

    // Flake "depth" proxy: far layers are smaller and dimmer
    float depthProxy = 1.0 - i / 6.0;

    vec2 pos  = v_uv * ar * gsize + vec2(wobble * gsize, u_time * speed * gsize);
    vec2 cell = floor(pos);
    vec2 fr   = fract(pos) - 0.5; // -0.5..0.5

    float r = rand(cell + i*37.3);
    if(r > 0.80){
      // Flake size from exponential-like distribution (per Gunn-Marshall)
      float sz = (0.03 + rand(cell+55.0)*0.07) * (0.4 + depthProxy*0.6);

      // Motion-blur streak: elongate in fall direction (y axis in UV)
      // Blur length proportional to speed (faster = longer streak)
      float blurLen = speed * 0.55;
      float aspect_flake = u_resolution.y / u_resolution.x;
      // Distance to the elongated streak capsule
      float fy  = clamp(fr.y, -blurLen*0.5, blurLen*0.5);
      vec2  closest = vec2(fr.x, fr.y - fy);
      float d   = length(closest * vec2(ar.x, 1.0));

      float flake = smoothstep(sz, sz*0.1, d);

      // Opacity: near flakes more opaque, far ones nearly transparent
      float alpha = opacity * (0.3 + 0.7*depthProxy);
      // Slight twinkle
      alpha *= 0.85 + 0.15*sin(u_time*5.0 + r*80.0);

      falling = max(falling, flake * alpha);
    }
  }
  // Flakes fade out as they near/hit the pile
  falling *= (1.0 - inPile * 0.7);

  // ── Hand-blown dust ──────────────────────────────────────
  float dust = 0.0;
  if(u_mouse_speed > 0.004){
    vec2 mpos = vec2(1.0 - u_mouse.x, 1.0 - u_mouse.y);
    for(float d = 0.0; d < 8.0; d++){
      // Each particle: unique angle, travels outward over lifetime
      float seed   = d * 7.3 + floor(u_time * 6.0) * 0.1;
      float angle  = rand1(seed) * 6.2831;
      float t      = fract(u_time*(0.5+rand1(d*3.1)*0.4) + rand1(d*11.0));
      float radius = 0.01 + t * 0.12;
      float life   = (1.0 - t) * (1.0 - t); // quick fade
      vec2  ppos   = mpos + vec2(cos(angle)*radius, sin(angle)*radius*0.6);
      float dp     = length(uv - ppos);
      float ps     = 0.004 + rand1(d)*0.005;
      dust = max(dust, smoothstep(ps, 0.0, dp) * life * min(1.0, u_mouse_speed*5.0));
    }
    dust = clamp(dust, 0.0, 0.9);
  }

  // ── Composite ────────────────────────────────────────────
  // Subtle cold tint on video
  video = mix(video, video * vec3(0.86, 0.91, 1.06), 0.18);

  vec3 col = video;
  col = mix(col, snowCol, inPile);

  // Flakes: white with faint blue tint, blended additively for glow
  vec3 flakeCol = vec3(0.93, 0.96, 1.00);

let gl, program, posBuffer, texLocation;

let video, videoTexture;
let currentFilter = 0;
let programs = [];

let lastMouseX = 0.5, lastMouseY = 0.5;

let lastFrame = 0, frameCount = 0, fps = 0;

let squishCy     = 0.5; // pinch center Y
let squishSpan   = 0.2; // vertical band half-width

const SNOW_COLS = 256;

let snowAmount   = new Float32Array(SNOW_COLS); // accumulated depth 0..1 (grows slowly)

const canvas = document.getElementById('glcanvas');

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function buildProgram(fragSrc) {
  const vs = compileShader(gl.VERTEX_SHADER, VERT_SRC);
  const fs = compileShader(gl.FRAGMENT_SHADER, fragSrc);
  if (!vs || !fs) return null;
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
    return null;
  }
  return prog;
}

function initGL() {
  gl = canvas.getContext('webgl', { preserveDrawingBuffer: true, antialias: false });
  if (!gl) { alert('Lame WebGL not supported'); return false; }

  // Compile all filter programs
  for (const f of FILTERS) {
    programs.push(buildProgram(f.frag));
  }

  // Fullscreen quad
  posBuffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  // Snow accumulation texture (1D strip: SNOW_COLS x 1)
  snowAccumTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, snowAccumTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, SNOW_COLS, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, snowTexData);

  // Offscreen canvas for CPU-side edge detection
  edgeCanvas = document.createElement('canvas');
  edgeCanvas.width  = SNOW_COLS;
  edgeCanvas.height = 64; // sample at low res
  edgeCtx = edgeCanvas.getContext('2d', { willReadFrequently: true });

}

function setProgram(idx) {
  program = programs[idx];
  gl.useProgram(program);

  const posLoc = gl.getAttribLocation(program, 'a_position');
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  uTex        = gl.getUniformLocation(program, 'u_tex');
  uSnowTex    = gl.getUniformLocation(program, 'u_snow_tex');
  uMouseSpeed = gl.getUniformLocation(program, 'u_mouse_speed');
  uSquish     = gl.getUniformLocation(program, 'u_squish');
  uSquishCx   = gl.getUniformLocation(program, 'u_squish_cx');
  uSquishCy   = gl.getUniformLocation(program, 'u_squish_cy');
  uSquishSpan = gl.getUniformLocation(program, 'u_squish_span');

function initVideoTexture() {

  gl.bindTexture(gl.TEXTURE_2D, videoTexture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
}

// ─────────────────────────────────────────────
//  SNOW ACCUMULATION SIMULATION
// ─────────────────────────────────────────────
const SNOW_FILTER_IDX = 2; // index of Snowfall in FILTERS array

function updateSnowAccumulation() {
  if (!video || video.readyState < 2) return;

  // Draw mirrored video into offscreen canvas
  edgeCtx.save();
  edgeCtx.translate(edgeCanvas.width, 0);
  edgeCtx.scale(-1, 1);
  edgeCtx.drawImage(video, 0, 0, edgeCanvas.width, edgeCanvas.height);
  edgeCtx.restore();

  const imgData = edgeCtx.getImageData(0, 0, SNOW_COLS, edgeCanvas.height);
  const px = imgData.data;
  const H  = edgeCanvas.height;
  const W  = SNOW_COLS;

  const handX      = mouseX;
  const distRadius = 0.10 + mouseSpeed * 1.2;

  // ── Pass 1: detect surfaces, update snowAmount ──────────────────
  for (let col = 0; col < W; col++) {
    const cx = col / W;

    // Find topmost edge by scanning top-down
    let edgeRow = -1;
    for (let row = 1; row < H - 1; row++) {
      const above = (row - 1) * W + col;
      const below = (row + 1) * W + col;
      const lumA = (px[above*4]*299 + px[above*4+1]*587 + px[above*4+2]*114) / 1000;
      const lumB = (px[below*4]*299 + px[below*4+1]*587 + px[below*4+2]*114) / 1000;
      // Horizontal gradient too
      const colL = Math.max(0, col-2), colR = Math.min(W-1, col+2);
      const lumL = (px[(row*W+colL)*4]*299 + px[(row*W+colL)*4+1]*587 + px[(row*W+colL)*4+2]*114)/1000;
      const lumR = (px[(row*W+colR)*4]*299 + px[(row*W+colR)*4+1]*587 + px[(row*W+colR)*4+2]*114)/1000;
      const grad = Math.abs(lumB - lumA) * 1.5 + Math.abs(lumR - lumL) * 0.8;
      if (grad > 22) { edgeRow = row; break; }
    }

    // Smooth the surface position with a very slow lerp — prevents jitter
    if (edgeRow >= 0) {
      const detectedY = 1.0 - (edgeRow / H);
      // Only update if detected surface is in a plausible range (top 80% of frame = head area)
      if (detectedY > 0.2) {
        surfaceVotes[col] += (detectedY - surfaceVotes[col]) * 0.015; // was 0.08 — much slower
      }
    } else {
      // No edge — surface slowly fades out
      surfaceVotes[col] *= 0.998; // was 0.99
    }

    snowSurface[col] = surfaceVotes[col];

    // ── Snow amount: grows VERY slowly, only when surface is stable ──
    // Target: takes ~60s of stillness to reach a visible dusting (~amount=0.3)
    // +0.00022 * 0.06 chance * 60fps ≈ +0.00079/s → 0.3 in ~380s. Too slow.
    // Use +0.0004 * 8% chance * 60fps ≈ +0.00192/s → visible at 0.1 in ~52s
    if (snowSurface[col] > 0.15) {
      if (Math.random() < 0.08) { // 8% of frames
        snowAmount[col] = Math.min(1.0, snowAmount[col] + 0.0004);
      }
    } else {
      snowAmount[col] *= 0.9995; // very slow melt
    }

    // ── Hand disturbance ──────────────────────────────────────────
    const dx = cx - handX;
    const proximity = Math.max(0, 1.0 - Math.abs(dx) / distRadius);

    if (mouseSpeed > 0.005 && proximity > 0) {
      const wipe = proximity * mouseSpeed * 3.5;
      snowDisturb[col] = Math.min(1.0, snowDisturb[col] + wipe);
      // Actually remove snow — scatter it away proportional to wipe strength
      snowAmount[col] = Math.max(0, snowAmount[col] - wipe * 0.6);
    }

    // Disturbance decays back to calm
    snowDisturb[col] *= 0.88;
  }

  // ── Pass 2: lateral spread — snow slumps sideways slightly ────────
  const spreadRate = 0.0008;
  for (let col = 1; col < W - 1; col++) {
    const diff = (snowAmount[col-1] + snowAmount[col+1]) * 0.5 - snowAmount[col];
    if (diff > 0) snowAmount[col] += diff * spreadRate;
  }

  // ── Pack into texture ─────────────────────────────────────────────
  for (let col = 0; col < W; col++) {
    const i = col * 4;
    // R = surface Y position, G = snow depth/amount, B = disturbance
    snowTexData[i+0] = Math.round(Math.min(1, Math.max(0, snowSurface[col])) * 255);
    snowTexData[i+1] = Math.round(Math.min(1, Math.max(0, snowAmount[col]))  * 255);
    snowTexData[i+2] = Math.round(Math.min(1, Math.max(0, snowDisturb[col])) * 255);
    snowTexData[i+3] = 255;
  }

  gl.bindTexture(gl.TEXTURE_2D, snowAccumTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, SNOW_COLS, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, snowTexData);
}

function render(ts) {
  animId = requestAnimationFrame(render);

  // FPS
  frameCount++;
  if (ts - lastFrame >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFrame = ts;
    document.getElementById('fps-val').textContent = fps;
  }

  // Resize GL canvas resolution to match its CSS-rendered size
  const W = canvas.clientWidth  || 640;
  const H = canvas.clientHeight || 480;
  if (canvas.width !== W || canvas.height !== H) {
    canvas.width  = W;
    canvas.height = H;
  }

  // Mouse speed (decays each frame)
  mouseSpeed *= 0.82;

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, videoTexture);

  if (currentFilter === SNOW_FILTER_IDX) {
    updateSnowAccumulation();
  }

  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(program);

  if (uTime)       gl.uniform1f(uTime, ts * 0.001);
  if (uMouse)      gl.uniform2f(uMouse, mouseX, mouseY);
  if (uResolution) gl.uniform2f(uResolution, canvas.width, canvas.height);

  if (uSquishCx)   gl.uniform1f(uSquishCx,   squishCx);
  if (uSquishCy)   gl.uniform1f(uSquishCy,   squishCy);
  if (uSquishSpan) gl.uniform1f(uSquishSpan, squishSpan);

  if (uTex) {
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, videoTexture);
    gl.uniform1i(uTex, 0);
  }

  if (uSnowTex) {
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, snowAccumTex);
    gl.uniform1i(uSnowTex, 1);
  }

  gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  track.innerHTML = '';
  FILTERS.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip' + (i === currentFilter ? ' active' : '');
    chip.innerHTML = `
      <div class="chip-preview"><div class="chip-icon">${f.emoji}</div></div>
      <div class="chip-label">${f.name}</div>`;
    chip.addEventListener('click', () => selectFilter(i));
    track.appendChild(chip);
  });
}

function selectFilter(idx) {
  currentFilter = ((idx % FILTERS.length) + FILTERS.length) % FILTERS.length;
  setProgram(currentFilter);
  buildCarousel();
  document.getElementById('filter-name-overlay').textContent = FILTERS[currentFilter].name.toUpperCase();
}

// Flash effect
function doFlash() {
  const fl = document.getElementById('flash-overlay');
  fl.style.transition = 'opacity 0s';
  fl.style.opacity = '1';
  setTimeout(() => {
    fl.style.transition = 'opacity 0.55s ease';
    fl.style.opacity = '0';
  }, 60);
}

// Capture
function capture() {
  doFlash();
  setTimeout(() => {
    const dataURL = canvas.toDataURL('image/png');
    addToGallery(dataURL);
  }, 80);
}

let galleryItems = [];

function addToGallery(dataURL) {
  galleryItems.unshift(dataURL);
  const strip = document.getElementById('gallery-strip');
  const img = document.createElement('img');
  img.className = 'gallery-thumb';
  img.src = dataURL;
  img.title = 'Click to view';
  img.addEventListener('click', () => openLightbox(dataURL));
  strip.insertBefore(img, strip.firstChild);
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('open');
  document.getElementById('lightbox-dl').onclick = () => {
    const a = document.createElement('a');
    a.href = src;
    a.download = `glsl-booth-${Date.now()}.png`;
    a.click();
  };
}

// ─────────────────────────────────────────────
//  STARTUP
// ─────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });

    video = document.createElement('video');
    video.srcObject = stream;
    video.playsInline = true;
    video.muted = true;
    await video.play();

    // Sync canvas aspect ratio to actual camera output — avoids squishing
    const vw = video.videoWidth  || 640;
    const vh = video.videoHeight || 480;
    canvas.style.aspectRatio = `${vw} / ${vh}`;

    if (!initGL()) return;
    initVideoTexture();
    selectFilter(0);
    buildCarousel();

    // Hide permission screen
    document.getElementById('permission-screen').style.display = 'none';

    // Start MediaPipe hand tracking
    initMediaPipe();

    requestAnimationFrame(render);
  } catch(e) {
    console.error(e);
    document.getElementById('permission-screen').querySelector('p').textContent =
      '⚠ Camera access denied or unavailable. Please check permissions.';
  }
});

// Mouse tracking with velocity
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const nx = (e.clientX - rect.left) / rect.width;
  const ny = 1.0 - (e.clientY - rect.top) / rect.height;
  const dx = nx - mouseX;
  const dy = ny - mouseY;
  mouseSpeed = Math.min(1.0, Math.sqrt(dx*dx + dy*dy) * 30.0 + mouseSpeed * 0.5);
  lastMouseX = mouseX; lastMouseY = mouseY;
  mouseX = nx; mouseY = ny;
});

// Touch tracking — same as mouse for snow gesture
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const nx = (t.clientX - rect.left) / rect.width;
  const ny = 1.0 - (t.clientY - rect.top) / rect.height;
  const dx = nx - mouseX;
  const dy = ny - mouseY;
  mouseSpeed = Math.min(1.0, Math.sqrt(dx*dx + dy*dy) * 30.0 + mouseSpeed * 0.5);
  mouseX = nx; mouseY = ny;
}, { passive: false });

canvas.addEventListener('touchend', () => { mouseSpeed = 0; });

// Buttons
document.getElementById('btn-capture').addEventListener('click', capture);
document.getElementById('btn-prev').addEventListener('click', () => selectFilter(currentFilter - 1));
document.getElementById('btn-next').addEventListener('click', () => selectFilter(currentFilter + 1));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); capture(); }
  if (e.code === 'ArrowLeft') selectFilter(currentFilter - 1);
  if (e.code === 'ArrowRight') selectFilter(currentFilter + 1);
});

// Lightbox close
document.getElementById('lightbox-close').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('open');
  }
});

// ─────────────────────────────────────────────
//  MEDIAPIPE HANDS — HEAD SQUISHER
// ─────────────────────────────────────────────
const SQUISH_FILTER_IDX = FILTERS.length - 1; // last filter added

// Overlay canvas for drawing hand landmarks on top of WebGL canvas
const handOverlay = document.createElement('canvas');
handOverlay.style.cssText = `
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 5;
`;
document.querySelector('.stage').appendChild(handOverlay);
const hCtx = handOverlay.getContext('2d');

// Smoothed squish target
let squishTarget = 0;
let squishCxTarget = 0.5;
let squishCyTarget = 0.5;

// Pinch threshold in normalized landmark units
const PINCH_CLOSE = 0.06;  // fully squished
const PINCH_OPEN  = 0.18;  // no squish

function initMediaPipe() {
  // Dynamically load MediaPipe Hands
  const script1 = document.createElement('script');
  script1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
  const script2 = document.createElement('script');
  script2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
  script2.crossOrigin = 'anonymous';

  script2.onload = () => {
    const hands = new Hands({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 0,       // lite model — fastest, fine for gesture
      minDetectionConfidence: 0.7,
      minTrackingConfidence:  0.5,
    });

    hands.onResults(onHandResults);

    // Poll video frames into MediaPipe — throttled to ~20fps to save CPU
    let lastMPFrame = 0;
    function sendFrame(ts) {
      requestAnimationFrame(sendFrame);
      if (!video || video.readyState < 2) return;
      if (currentFilter !== SQUISH_FILTER_IDX) {
        // When not on squish filter, decay smoothly to zero and skip MP
        squishTarget = 0;
        squishAmount += (squishTarget - squishAmount) * 0.12;
        return;
      }
      if (ts - lastMPFrame < 48) return; // ~20fps
      lastMPFrame = ts;
      hands.send({ image: video });
    }
    requestAnimationFrame(sendFrame);
  };

  document.head.appendChild(script1);
  document.head.appendChild(script2);
}

function onHandResults(results) {
  // Sync overlay canvas size to display canvas
  handOverlay.width  = canvas.clientWidth;
  handOverlay.height = canvas.clientHeight;
  hCtx.clearRect(0, 0, handOverlay.width, handOverlay.height);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    squishTarget = 0;
    squishAmount += (0 - squishAmount) * 0.10;
    return;
  }

  let bestPinch = 0;
  let bestCx = 0.5, bestCy = 0.5, bestSpan = 0.2;

  for (const landmarks of results.multiHandLandmarks) {
    // MediaPipe landmark indices:
    // 4 = thumb tip, 8 = index finger tip
    // 0 = wrist, 5 = index MCP, 17 = pinky MCP
    const thumb = landmarks[4];
    const index = landmarks[8];
    const wrist = landmarks[0];

    // Mirror X to match our mirrored video feed
    const tx = 1 - thumb.x, ty = thumb.y;
    const ix = 1 - index.x, iy = index.y;
    const wx = 1 - wrist.x, wy = wrist.y;

    // Pinch distance (normalized 0..1 landmark space)
    const pinchDist = Math.sqrt((tx - ix) ** 2 + (ty - iy) ** 2);

    // Map distance to squish amount: closer = more squish
    const pinchStrength = 1 - Math.min(1, Math.max(0,
      (pinchDist - PINCH_CLOSE) / (PINCH_OPEN - PINCH_CLOSE)
    ));

    if (pinchStrength > bestPinch) {
      bestPinch = pinchStrength;
      // Center of squish: midpoint between thumb and index, X only
      bestCx = (tx + ix) / 2;
      // Vertical band: wrist Y defines bottom of head, squish at hand height
      bestCy = (ty + iy) / 2;
      // Span: distance from pinch midpoint to wrist = rough head height
      bestSpan = Math.abs(wy - bestCy) * 0.8 + 0.08;
    }

    // Draw hand skeleton overlay
    drawHand(landmarks, pinchStrength);
  }

  squishTarget    = bestPinch;
  squishCxTarget  = bestCx;
  squishCyTarget  = bestCy;
  squishSpan      = bestSpan;

  // Smooth the squish values
  const lerpRate = squishTarget > squishAmount ? 0.18 : 0.10;
  squishAmount += (squishTarget  - squishAmount)  * lerpRate;
  squishCx     += (squishCxTarget - squishCx)     * 0.2;
  squishCy     += (squishCyTarget - squishCy)     * 0.2;
}

function drawHand(landmarks, pinchStrength) {
  const W = handOverlay.width;
  const H = handOverlay.height;

  // Connection pairs for hand skeleton
  const connections = [
    [0,1],[1,2],[2,3],[3,4],       // thumb
    [0,5],[5,6],[6,7],[7,8],       // index
    [0,9],[9,10],[10,11],[11,12],  // middle
    [0,13],[13,14],[14,15],[15,16],// ring
    [0,17],[17,18],[18,19],[19,20],// pinky
    [5,9],[9,13],[13,17]           // palm
  ];

  const accent = `rgba(232,255,71,${0.5 + pinchStrength * 0.5})`;
  const pinchCol = pinchStrength > 0.5
    ? `rgba(255,71,120,${pinchStrength})`
    : accent;

  hCtx.strokeStyle = accent;
  hCtx.lineWidth   = 1.5;

  for (const [a, b] of connections) {
    const lA = landmarks[a], lB = landmarks[b];
    hCtx.beginPath();
    hCtx.moveTo((1 - lA.x) * W, lA.y * H);
    hCtx.lineTo((1 - lB.x) * W, lB.y * H);
    hCtx.stroke();
  }

  // Draw each landmark dot
  for (let i = 0; i < landmarks.length; i++) {
    const lm = landmarks[i];
    const x = (1 - lm.x) * W, y = lm.y * H;
    hCtx.beginPath();
    hCtx.arc(x, y, i === 4 || i === 8 ? 5 : 2.5, 0, Math.PI * 2);
    hCtx.fillStyle = (i === 4 || i === 8) ? pinchCol : accent;
    hCtx.fill();
  }

  // Draw pinch indicator line between thumb & index
  const t = landmarks[4], idx = landmarks[8];
  hCtx.beginPath();
  hCtx.moveTo((1 - t.x) * W, t.y * H);
  hCtx.lineTo((1 - idx.x) * W, idx.y * H);
  hCtx.strokeStyle = pinchCol;
  hCtx.lineWidth = 2;
  hCtx.setLineDash([4, 3]);
  hCtx.stroke();
  hCtx.setLineDash([]);

  // Pinch strength label
  if (pinchStrength > 0.05) {
    const mx = ((1-t.x) + (1-idx.x)) / 2 * W;
    const my = (t.y + idx.y) / 2 * H - 12;
    hCtx.font = '600 11px "Space Mono", monospace';
    hCtx.fillStyle = pinchCol;
    hCtx.textAlign = 'center';
    hCtx.fillText(`SQUISH ${Math.round(pinchStrength * 100)}%`, mx, my);
  }
}

// Hint overlay shown only on squish filter
function updateSquishHint() {
  const isSquish = currentFilter === SQUISH_FILTER_IDX;
  let hint = document.getElementById('squish-hint');
  if (!hint) {
    hint = document.createElement('div');
    hint.id = 'squish-hint';
    hint.style.cssText = `
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      font-family: 'Space Mono', monospace; font-size: 0.55rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(232,255,71,0.7); background: rgba(10,10,12,0.75);
      padding: 4px 10px; border-radius: 2px; pointer-events: none;
      white-space: nowrap; z-index: 6;
      transition: opacity 0.3s;
    `;
    hint.textContent = '🤏 Pinch over your head to squish';
    document.querySelector('.stage').appendChild(hint);
  }
  hint.style.opacity = isSquish ? '1' : '0';
}

// Hook into selectFilter to show/hide hint and clear overlay
const _origSelectFilter = selectFilter;
selectFilter = function(idx) {
  _origSelectFilter(idx);
  updateSquishHint();
  if (currentFilter !== SQUISH_FILTER_IDX) {
    hCtx && hCtx.clearRect(0, 0, handOverlay.width, handOverlay.height);
    squishAmount = 0; squishTarget = 0;
  }
};

// Init MediaPipe once camera is running (called from startup block above)
</script>
</body>
</html>
